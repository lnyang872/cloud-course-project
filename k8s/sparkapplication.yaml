apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: wordcount
  namespace: default
spec:
  type: Python
  mode: cluster
  image: swr.cn-south-1.myhuaweicloud.com/cloud-course/pyspark:v9
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/examples/wordcount.py
  sparkVersion: "3.5.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1g"
    labels:
      version: "3.5.0"
    serviceAccount: spark
    volumeMounts:
      - name: wordcount-script
        mountPath: /opt/spark/examples/wordcount.py
        subPath: wordcount.py
  executor:
    cores: 1
    instances: 2
    memory: "1g"
    labels:
      version: "3.5.0"
    volumeMounts:
      - name: wordcount-script
        mountPath: /opt/spark/examples/wordcount.py
        subPath: wordcount.py
  volumes:
    - name: wordcount-script
      configMap:
        name: wordcount-script
