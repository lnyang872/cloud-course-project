name: backend-cicd

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cicd.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-push-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      REGISTRY: swr.cn-south-1.myhuaweicloud.com
      IMAGE_REPO: cloud-course/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Update Kubernetes deployment image tag
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("k8s/deployment.yaml")
          text = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r"(image:\s*swr\.cn-south-1\.myhuaweicloud\.com/cloud-course/backend:)\S+",
              r"\g<1>" + os.environ["IMAGE_TAG"],
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("backend image line not found in k8s/deployment.yaml")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/configmap-secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify rollout
        run: kubectl rollout status deployment/backend -n default --timeout=180s

      - name: Commit updated deployment manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet && echo "No manifest changes to commit" && exit 0
          git commit -m "ci: update backend image tag to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
